name: Elixir CI

on: [push, pull_request]

jobs:
  build:
    name: Build and test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # All Elixir versions currently receiving security patches, each
        # paired with a supported OTP release:
        # https://hexdocs.pm/elixir/compatibility-and-deprecations.html
        include:
          - elixir: "1.16"
            otp: "26"
          - elixir: "1.17"
            otp: "27"
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20"
            otp: "29"
            lint: true
            coverage: true
    steps:
      - uses: actions/checkout@v7
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Restore dependencies cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-elixir${{ matrix.elixir }}-otp${{ matrix.otp }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-elixir${{ matrix.elixir }}-otp${{ matrix.otp }}-
      - name: Install dependencies
        run: mix deps.get
      - name: Check formatting
        run: mix format --check-formatted
        if: matrix.lint
      - name: Compile (warnings as errors)
        run: mix compile --force --warnings-as-errors
      - name: Run tests
        run: mix test --cover
      - name: Save PR information
        run: |
          echo "${{ github.event.pull_request.number }}" > cover/PR_NUMBER
          echo "${{ github.event.pull_request.head.sha }}" > cover/PR_SHA
        if: matrix.coverage && github.event.pull_request
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: elixir-lcov
          path: cover/
        if: matrix.coverage
